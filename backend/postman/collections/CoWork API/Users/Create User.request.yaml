$kind: http-request
name: Create User
method: POST
url: '{{base_url}}/users'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "John Doe",
      "email": "john@example.com",
      "active": true,
      "role": "coordinador"
    }
